name: Desktop Draft Release

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  desktop-release:
    name: Build ${{ matrix.target }} ${{ matrix.bundle }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            bundle_dir: desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
          - os: macos-14
            target: aarch64-apple-darwin
            bundle: dmg
            bundle_dir: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle: dmg
            bundle_dir: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' pyinstaller

      - name: Python tests and package health
        run: |
          python -m pytest -q
          python -m pip check

      - name: Build target-suffixed Python sidecar before Cargo/Tauri
        shell: bash
        run: |
          python desktop/scripts/build_sidecar.py --target ${{ matrix.target }} --execute
          test -f "desktop/src-tauri/binaries/pitchmind-sidecar-${{ matrix.target }}" || test -f "desktop/src-tauri/binaries/pitchmind-sidecar-${{ matrix.target }}.exe"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop Node dependencies deterministically
        working-directory: desktop
        run: npm ci

      - name: Set up Rust stable target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify desktop source contract
        run: python desktop/scripts/verify_desktop_config.py

      - name: Build Tauri bundle
        working-directory: desktop
        run: npm run tauri:build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Verify DMG artifact exists; mounted layout is checked locally
        if: ${{ matrix.bundle == 'dmg' }}
        shell: bash
        run: |
          set -euo pipefail
          dmg_count=$(find "${{ matrix.bundle_dir }}" -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d ' ')
          test "$dmg_count" = "1"
          dmg_path=$(find "${{ matrix.bundle_dir }}" -maxdepth 1 -type f -name '*.dmg' -print -quit)
          echo "CI verifies that exactly one DMG artifact was produced. Mounted layout acceptance is performed locally on macOS with hdiutil."
          python desktop/scripts/verify_dmg_layout.py --dmg "$dmg_path" --skip-mount

      - name: Normalize desktop release artifact
        run: >-
          python desktop/scripts/package_desktop_release.py
          --bundle-dir "${{ matrix.bundle_dir }}"
          --target "${{ matrix.target }}"
          --bundle "${{ matrix.bundle }}"
          --output-dir "desktop-release/${{ matrix.target }}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.target }}-${{ matrix.bundle }}
          path: desktop-release/${{ matrix.target }}/
          if-no-files-found: error

  source-package:
    name: Build allowlisted source package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build source package
        run: python scripts/package_desktop_source.py --output-dir source-release --deterministic-name
      - name: Upload source package
        uses: actions/upload-artifact@v7
        with:
          name: source-package
          path: source-release/worldcup-ai-content-engine-source.tar.gz
          if-no-files-found: error

  draft-release:
    name: Create draft GitHub Release only
    runs-on: ubuntu-latest
    needs: [desktop-release, source-package]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Create combined checksum manifest and release notes
        run: |
          python scripts/write_checksums.py release-assets/* --output release-assets/SHA256SUMS.txt
          python scripts/create_release_notes.py --assets-dir release-assets --output release-assets/RELEASE_NOTES.md
      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: desktop-beta-${{ github.run_number }}
          name: PitchMind Desktop unsigned Beta ${{ github.run_number }}
          body_path: release-assets/RELEASE_NOTES.md
          draft: true
          prerelease: true
          make_latest: false
          files: release-assets/*
