<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">PitchMind verified historical performance</title>
  <desc id="desc">Dashboard showing 86 clean pre-match samples, 74.4 percent 1X2 direction accuracy, 38.4 percent exact-score Top 3 coverage, and six selected Top 1 exact-score hits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06152d"/>
      <stop offset="0.55" stop-color="#0a2856"/>
      <stop offset="1" stop-color="#07101f"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="8%" r="75%">
      <stop offset="0" stop-color="#2de2e6" stop-opacity="0.20"/>
      <stop offset="0.48" stop-color="#3277ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#06152d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2de2e6"/>
      <stop offset="1" stop-color="#45a8ff"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#61d9ff"/>
      <stop offset="1" stop-color="#8b6dff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020814" flood-opacity="0.36"/>
    </filter>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .label{fill:#7fa7d9;font-size:15px;font-weight:700;letter-spacing:1.6px}
      .metric{fill:#f3f9ff;font-size:50px;font-weight:800;letter-spacing:-1px}
      .small{fill:#a8bddb;font-size:14px}
      .cardTitle{fill:#edf7ff;font-size:18px;font-weight:750}
      .score{fill:#69e7ff;font-size:27px;font-weight:850}
      .muted{fill:#89a6ca;font-size:13px}
    </style>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="760" rx="28" fill="url(#glow)"/>
  <g opacity="0.16">
    <path d="M0 100H1280 M0 200H1280 M0 300H1280 M0 400H1280 M0 500H1280 M0 600H1280 M0 700H1280" stroke="#65baff"/>
    <path d="M80 0V760 M240 0V760 M400 0V760 M560 0V760 M720 0V760 M880 0V760 M1040 0V760 M1200 0V760" stroke="#3766a1"/>
  </g>

  <g class="sans">
    <text x="64" y="72" fill="#eef8ff" font-size="31" font-weight="820">VERIFIED HISTORICAL PERFORMANCE</text>
    <text x="64" y="103" fill="#75dfff" font-size="16" font-weight="650">PITCHMIND · PRE-MATCH ARCHIVE × RESULT LEDGER</text>
    <g transform="translate(1095 52)">
      <circle cx="44" cy="30" r="29" fill="none" stroke="#2de2e6" stroke-width="2" opacity="0.72"/>
      <path d="M20 30H68 M44 6V54 M27 13L61 47 M61 13L27 47" stroke="#7bdfff" opacity="0.5"/>
      <circle cx="44" cy="30" r="9" fill="#071a36" stroke="#d7f8ff" stroke-width="2"/>
    </g>

    <!-- KPI cards -->
    <g transform="translate(64 132)" filter="url(#shadow)">
      <rect width="344" height="178" rx="20" fill="#0c2348" stroke="#285786"/>
      <text x="24" y="36" class="label">CLEAN SAMPLES</text>
      <text x="24" y="101" class="metric">86</text>
      <text x="105" y="101" fill="#a8bddb" font-size="20" font-weight="650">MATCHES</text>
      <path d="M24 133H320" stroke="#183b66" stroke-width="8" stroke-linecap="round"/>
      <path d="M24 133H320" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round"/>
      <text x="24" y="158" class="small">Real pre-match snapshot available</text>
    </g>

    <g transform="translate(432 132)" filter="url(#shadow)">
      <rect width="392" height="178" rx="20" fill="#0c2348" stroke="#285786"/>
      <text x="24" y="36" class="label">1X2 DIRECTION ACCURACY</text>
      <text x="24" y="101" class="metric">74.4%</text>
      <text x="250" y="101" fill="#a8bddb" font-size="18" font-weight="700">64 / 86</text>
      <path d="M24 133H368" stroke="#183b66" stroke-width="9" stroke-linecap="round"/>
      <path d="M24 133H280" stroke="url(#cyan)" stroke-width="9" stroke-linecap="round"/>
      <circle cx="280" cy="133" r="6" fill="#dffcff"/>
      <text x="24" y="158" class="small">Wins, draws and losses · full clean set</text>
    </g>

    <g transform="translate(848 132)" filter="url(#shadow)">
      <rect width="368" height="178" rx="20" fill="#0c2348" stroke="#285786"/>
      <text x="24" y="36" class="label">EXACT SCORE · TOP 3</text>
      <text x="24" y="101" class="metric">38.4%</text>
      <text x="230" y="101" fill="#a8bddb" font-size="18" font-weight="700">33 / 86</text>
      <path d="M24 133H344" stroke="#183b66" stroke-width="9" stroke-linecap="round"/>
      <path d="M24 133H147" stroke="url(#violet)" stroke-width="9" stroke-linecap="round"/>
      <circle cx="147" cy="133" r="6" fill="#e4deff"/>
      <text x="24" y="158" class="small">Final score appeared in model Top 3</text>
    </g>

    <text x="64" y="361" fill="#edf7ff" font-size="22" font-weight="780">SELECTED TOP 1 EXACT-SCORE HITS</text>
    <text x="1216" y="361" fill="#799ac1" font-size="13" text-anchor="end">Saved before kickoff</text>

    <!-- Match cards row 1 -->
    <g transform="translate(64 385)">
      <rect width="368" height="122" rx="17" fill="#0b203f" stroke="#285786"/>
      <text x="20" y="31" class="cardTitle">Argentina vs Austria</text>
      <text x="20" y="63" class="muted">MODEL TOP 3</text>
      <text x="118" y="64" fill="#dcecff" font-size="15" font-weight="700">2:0 · 1:0 · 3:0</text>
      <text x="20" y="101" class="muted">FINAL</text>
      <text x="84" y="103" class="score">2:0</text>
      <rect x="290" y="81" width="58" height="24" rx="12" fill="#123d67" stroke="#2de2e6"/>
      <text x="319" y="98" fill="#96f4ff" font-size="12" font-weight="800" text-anchor="middle">TOP 1</text>
    </g>
    <g transform="translate(456 385)">
      <rect width="368" height="122" rx="17" fill="#0b203f" stroke="#285786"/>
      <text x="20" y="31" class="cardTitle">France vs Iraq</text>
      <text x="20" y="63" class="muted">MODEL TOP 3</text>
      <text x="118" y="64" fill="#dcecff" font-size="15" font-weight="700">3:0 · 2:0 · 4:0</text>
      <text x="20" y="101" class="muted">FINAL</text>
      <text x="84" y="103" class="score">3:0</text>
      <rect x="290" y="81" width="58" height="24" rx="12" fill="#123d67" stroke="#2de2e6"/>
      <text x="319" y="98" fill="#96f4ff" font-size="12" font-weight="800" text-anchor="middle">TOP 1</text>
    </g>
    <g transform="translate(848 385)">
      <rect width="368" height="122" rx="17" fill="#0b203f" stroke="#285786"/>
      <text x="20" y="31" class="cardTitle">Brazil vs Haiti</text>
      <text x="20" y="63" class="muted">MODEL TOP 3</text>
      <text x="118" y="64" fill="#dcecff" font-size="15" font-weight="700">3:0 · 4:0 · 5:0</text>
      <text x="20" y="101" class="muted">FINAL</text>
      <text x="84" y="103" class="score">3:0</text>
      <rect x="290" y="81" width="58" height="24" rx="12" fill="#123d67" stroke="#2de2e6"/>
      <text x="319" y="98" fill="#96f4ff" font-size="12" font-weight="800" text-anchor="middle">TOP 1</text>
    </g>

    <!-- Match cards row 2 -->
    <g transform="translate(64 525)">
      <rect width="368" height="122" rx="17" fill="#0b203f" stroke="#285786"/>
      <text x="20" y="31" class="cardTitle">France vs Sweden</text>
      <text x="20" y="63" class="muted">MODEL TOP 3</text>
      <text x="118" y="64" fill="#dcecff" font-size="15" font-weight="700">3:0 · 4:0 · 2:0</text>
      <text x="20" y="101" class="muted">FINAL</text>
      <text x="84" y="103" class="score">3:0</text>
      <rect x="290" y="81" width="58" height="24" rx="12" fill="#123d67" stroke="#2de2e6"/>
      <text x="319" y="98" fill="#96f4ff" font-size="12" font-weight="800" text-anchor="middle">TOP 1</text>
    </g>
    <g transform="translate(456 525)">
      <rect width="368" height="122" rx="17" fill="#0b203f" stroke="#285786"/>
      <text x="20" y="31" class="cardTitle">USA vs Bosnia &amp; Herzegovina</text>
      <text x="20" y="63" class="muted">MODEL TOP 3</text>
      <text x="118" y="64" fill="#dcecff" font-size="15" font-weight="700">2:0 · 3:0 · 2:1</text>
      <text x="20" y="101" class="muted">FINAL</text>
      <text x="84" y="103" class="score">2:0</text>
      <rect x="290" y="81" width="58" height="24" rx="12" fill="#123d67" stroke="#2de2e6"/>
      <text x="319" y="98" fill="#96f4ff" font-size="12" font-weight="800" text-anchor="middle">TOP 1</text>
    </g>
    <g transform="translate(848 525)">
      <rect width="368" height="122" rx="17" fill="#0b203f" stroke="#285786"/>
      <text x="20" y="31" class="cardTitle">Portugal vs Croatia</text>
      <text x="20" y="63" class="muted">MODEL TOP 3</text>
      <text x="118" y="64" fill="#dcecff" font-size="15" font-weight="700">2:1 · 1:1 · 3:1</text>
      <text x="20" y="101" class="muted">FINAL</text>
      <text x="84" y="103" class="score">2:1</text>
      <rect x="290" y="81" width="58" height="24" rx="12" fill="#123d67" stroke="#2de2e6"/>
      <text x="319" y="98" fill="#96f4ff" font-size="12" font-weight="800" text-anchor="middle">TOP 1</text>
    </g>

    <path d="M64 686H1216" stroke="#244c76"/>
    <text x="64" y="716" fill="#8fa9c8" font-size="13">Selected successful examples. Aggregate metrics above include both hits and misses.</text>
    <text x="1216" y="716" fill="#8fa9c8" font-size="13" text-anchor="end">Historical performance is not a promise of future outcomes.</text>
  </g>
</svg>
