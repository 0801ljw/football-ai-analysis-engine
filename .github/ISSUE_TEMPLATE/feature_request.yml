name: Feature request
description: Suggest a focused improvement to the PitchMind workflow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What task is difficult today, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: Describe the smallest useful behavior change.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Example or evidence
      description: Screenshots are welcome, but remove tokens and private report data.
  - type: checkboxes
    id: boundary
    attributes:
      label: Product boundary
      options:
        - label: This request is for football research or report workflow and does not ask for guaranteed outcomes or betting advice.
          required: true
